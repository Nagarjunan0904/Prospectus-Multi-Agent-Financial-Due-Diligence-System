[supervisord]
nodaemon=true
logfile=/dev/stdout
logfile_maxbytes=0

[program:data_agent]
command=python -m mcp_servers.data_agent.server --transport http --port 9001
autorestart=true
priority=100
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:quant_agent]
command=python -m mcp_servers.quant_agent.server --transport http --port 9002
autorestart=true
priority=100
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:sentiment_agent]
command=python -m mcp_servers.sentiment_agent.server --transport http --port 9003
autorestart=true
priority=100
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:risk_agent]
command=python -m mcp_servers.risk_agent.server --transport http --port 9004
autorestart=true
priority=100
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

# NOTE: the 4 agents above are explicitly priority=100 (lower number = starts
# first). supervisord's own default priority is 999, so without setting this
# explicitly the agents would tie with api below and start in alphabetical
# order instead ("api" sorts before "data_agent" etc.) — verified this the
# hard way in a local docker run before adding priority=100 here.
#
# KNOWN LIMITATION: if an MCP agent process crashes and autorestart brings
# it back up, FastAPI's lifespan already opened its LangGraph/checkpointer
# context once at startup and won't detect the agent came back on its own.
# This is not actually a problem in practice: mcp_clients/*.py opens a new
# MCP ClientSession per call (see _open_session() in each client), so the
# NEXT request after the agent restarts just reconnects fresh. No special
# handling needed — confirmed against the per-call session pattern.
[program:api]
command=uvicorn backend.api.main:app --host 0.0.0.0 --port %(ENV_PORT)s
autorestart=true
startsecs=5
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=999
